services:
  backend:
    build:
      context: ./backend
    container_name: harness-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite DB and user workspaces across container rebuilds.
      - ./data:/app/data
      - ./workspaces:/app/workspaces
      - ./skills:/app/skills
    restart: unless-stopped
    # For dev: enable reload. Override via docker-compose.override.yml.
    # command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

